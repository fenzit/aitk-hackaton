version: "3.9"

services:

  backend:
    build: ./backend
    container_name: citymind-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ml-service:
    build: ./ml
    container_name: citymind-ml
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: citymind-frontend
    ports:
      - "3000:3000"
    environment:
      # NUXT_PUBLIC_* — видны браузеру (WebSocket и REST идут через localhost)
      - NUXT_PUBLIC_WS_URL=ws://localhost:8000/ws/city
      - NUXT_PUBLIC_API_URL=http://localhost:8000
      # NUXT_API_URL — только для SSR, внутри Docker-сети
      - NUXT_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
